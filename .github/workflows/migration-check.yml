name: Migration Check

on:
  push:
    paths:
      - 'packages/db/**'
  pull_request:
    paths:
      - 'packages/db/**'

jobs:
  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @restoran-pos/db migrate

      - name: Codegen
        run: pnpm --filter @restoran-pos/db codegen

      - name: Verify generated.ts is up to date
        run: git diff --exit-code packages/db/src/generated.ts
