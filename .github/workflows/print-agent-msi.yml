name: Print Agent MSI Build

# ADR-004 §Phase 3 PR-6 Soru #3: windows-latest + WiX v4 dotnet tool.
# Tetikleyici: workflow_dispatch (manuel) + tag push (`print-agent-v*`).
# CI dakikaya yük olmasın diye normal PR run'larında çalışmaz.

on:
  workflow_dispatch:
  push:
    tags:
      - 'print-agent-v*'

jobs:
  build:
    name: Build MSI on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript compile (with workspace deps)
        run: pnpm turbo run build --filter='@restoran-pos/print-agent...'

      - name: Build .exe with pkg
        run: pnpm --filter '@restoran-pos/print-agent' build:exe

      - name: Verify vendored nssm.exe
        shell: pwsh
        run: |
          $path = "apps/print-agent/installer/vendor/nssm.exe"
          if (-not (Test-Path $path)) { throw "vendored nssm.exe yok: $path" }
          $size = (Get-Item $path).Length
          Write-Host "nssm.exe size: $size bytes"
          if ($size -lt 100000) { throw "nssm.exe boyutu beklenenden kucuk (<100KB)" }

      - name: Verify vendored spooler-raw.exe (ADR-004 Amd4)
        shell: pwsh
        run: |
          $path = "apps/print-agent/installer/vendor/spooler-raw.exe"
          if (-not (Test-Path $path)) { throw "vendored spooler-raw.exe yok: $path" }
          $size = (Get-Item $path).Length
          Write-Host "spooler-raw.exe size: $size bytes"
          if ($size -lt 500000) { throw "spooler-raw.exe boyutu beklenenden kucuk (<500KB)" }

      - name: Install WiX v4
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI
        shell: pwsh
        working-directory: apps/print-agent/installer
        run: |
          $pkg = Get-Content ../package.json -Raw | ConvertFrom-Json
          $version = $pkg.version
          $output = "dist/print-agent-$version.msi"
          New-Item -ItemType Directory -Path (Split-Path $output) -Force | Out-Null
          # WiX path'leri CWD'den cozer (wxs dizinine gore degil) — bu yuzden installer/ icinden cagiriyoruz
          wix build print-agent.wxs -arch x64 -out $output
          if (-not (Test-Path $output)) { throw "MSI uretilemedi: $output" }
          $size = (Get-Item $output).Length / 1MB
          Write-Host "MSI: $output ($([math]::Round($size, 2)) MB)"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: print-agent-msi
          path: apps/print-agent/installer/dist/*.msi
          retention-days: 30
