name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Mask sensitive secrets
        run: |
          echo "::add-mask::${{ secrets.MIGRATOR_DATABASE_URL }}"
          echo "::add-mask::${{ secrets.APP_DATABASE_URL }}"
          echo "::add-mask::${{ secrets.JWT_SECRET }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - name: pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Audit log INSERT guard
        run: |
          if grep -rn --include="*.ts" \
            -e "INSERT INTO audit_logs" \
            -e "\.insertInto('audit_logs')" \
            -e ".insertInto(\"audit_logs\")" \
            apps/ packages/shared-domain/ packages/db/src/ \
            | grep -v "apps/api/src/audit/writeAudit.ts" \
            | grep -v "packages/db/migrations/" \
            | grep -v ".test.ts" \
            | grep -q .; then
            echo "ERROR: Direct audit_logs INSERT found outside writeAudit.ts"
            exit 1
          fi
          echo "Audit INSERT guard: OK"

      - run: pnpm turbo run typecheck lint test build
